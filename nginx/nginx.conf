server {
    listen 80 default_server;
    server_name _;
    return 301 https://orca.freeddns.org$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/orca.freeddns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orca.freeddns.org/privkey.pem;
    return 444; # Drop the connection
}

server {
    listen 443 ssl;
    server_name orca.freeddns.org;

    ssl_certificate /etc/letsencrypt/live/orca.freeddns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orca.freeddns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}