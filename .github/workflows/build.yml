name: Build

on:
  workflow_call:

jobs:
  build-frontend:
    name: "Build: Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

  build-backend:
    name: "Build: Backend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Verify backend entry point
        run: node --check server.js
        working-directory: ./backend