name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: ./backend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: ./frontend

  sca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ORCA'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: >
            --enableRetired
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

  sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run ESLint on frontend
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file ../reports/frontend.sarif
        working-directory: ./frontend
        continue-on-error: true

      - name: Run ESLint on backend
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file ../reports/backend.sarif
        working-directory: ./backend
        continue-on-error: true

      - name: Upload frontend SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/frontend.sarif
          category: eslint-frontend

      - name: Upload backend SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/backend.sarif
          category: eslint-backend

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-javascript

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [audit, sca, sast, codeql, gitleaks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/student36/orca
            git pull origin main
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build