name: Security Checks

on:
  workflow_call:

jobs:
  sca-npm-audit:
    name: "SCA: npm audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: ./backend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: ./frontend

  sca-owasp-dependency-check:
    name: "SCA: OWASP Dependency-Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ORCA'
          path: '.'
          format: 'ALL'
          out: 'reports'
          args: >
            --enableRetired
            ${{ secrets.NVD_API_KEY != '' && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-check-report
          path: reports/

  sast-eslint-frontend:
    name: "SAST: ESLint Frontend"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run ESLint on frontend
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file ../reports/frontend.sarif
        working-directory: ./frontend
        continue-on-error: true

      - name: Upload frontend SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/frontend.sarif
          category: eslint-frontend

  sast-eslint-backend:
    name: "SAST: ESLint Backend"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run ESLint on backend
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file ../reports/backend.sarif
        working-directory: ./backend
        continue-on-error: true

      - name: Upload backend SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/backend.sarif
          category: eslint-backend

  sast-codeql:
    name: "SAST: CodeQL"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-javascript

  sast-sonarqube:
    name: "SAST: SonarQube"
    if: github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, ec2]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend
 
      - uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: frontend/coverage      
 
      - uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: backend/coverage

      - name: SonarQube scan - Frontend
        uses: sonarsource/sonarqube-scan-action@v8.2.1
        with:
          projectBaseDir: ./frontend
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

      - name: SonarQube scan - Backend
        uses: sonarsource/sonarqube-scan-action@v8.2.1
        with:
          projectBaseDir: ./backend
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

  secrets-gitleaks:
    name: "Secrets: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}