name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/build.yml

  test-frontend:
    name: "Test: Frontend"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run frontend tests with coverage
        run: npm run test:coverage
        working-directory: ./frontend

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

  test-backend:
    name: "Test: Backend"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run backend tests with coverage
        run: npm run test:coverage
        working-directory: ./backend

      - name: Upload backend coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info

  test-e2e:
    name: "Test: E2E (Playwright)"
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Generate E2E environment
        run: bash e2e/scripts/generate-e2e-env.sh .env

      - name: Start E2E stack
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Install E2E dependencies
        run: npm ci
        working-directory: ./e2e

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"
        working-directory: ./e2e

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: ./e2e

      - name: Install Playwright OS dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: ./e2e

      - name: Run Playwright tests
        run: npm test
        working-directory: ./e2e
        env:
          CI: true
          BASE_URL: http://localhost:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  security-checks:
    needs: [build, test-frontend, test-backend]
    uses: ./.github/workflows/security-checks.yml
    secrets: inherit
    permissions:
      security-events: write
      actions: read
      contents: read