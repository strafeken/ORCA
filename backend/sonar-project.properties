sonar.projectKey=orca-backend
sonar.projectName=ORCA Backend
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/logs/**,**/*.test.*,**/coverage/**,**/scripts/**
sonar.tests=tests
sonar.test.inclusions=**/*.test.js
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: files that cannot be meaningfully covered by unit or
# integration tests are removed from the coverage % (they are STILL analysed for
# security/quality -- this only affects the coverage metric). Each is validated
# instead by the running application (deployment) and by end-to-end testing in
# the verification phase (Report III), consistent with the testing pyramid.
#
#   server.js / app.js / db/pool.js  - bootstrap & DB-pool wiring, no branching logic
#   constants/passwordPolicy.js      - shared length constants only
#   utils/winstonLogger.js, logger.js - logger config (connects to Loki)
#   sockets/index.js                 - Socket.io server bootstrap wiring
#   sockets/webrtc.js                - WebRTC peer-to-peer signalling (FR-11);
#                                      requires live peer + socket client (E2E only)
#   adapters/TranscoderAdapter.js, utils/audio.js - FFmpeg (external binary) wrappers
#   middleware/upload.js             - Multer disk storage & MIME allowlists (filesystem)
#   routes/health.js                 - trivial liveness probe
#   routes/files.js                  - conversation file/voice upload & download (FR-08);
#                                      needs real uploads + FFmpeg transcode (E2E)
#   routes/annotations.js            - image overlay persistence (FR-09); E2E with canvas UI
#   routes/admin.js                  - admin API surface; covered by admin integration + E2E
sonar.coverage.exclusions=**/server.js,**/app.js,**/db/pool.js,**/constants/**,**/utils/winstonLogger.js,**/utils/logger.js,**/sockets/index.js,**/sockets/webrtc.js,**/adapters/TranscoderAdapter.js,**/utils/audio.js,**/middleware/upload.js,**/routes/health.js,**/routes/files.js,**/routes/annotations.js,**/routes/admin.js
