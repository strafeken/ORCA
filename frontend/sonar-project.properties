sonar.projectKey=orca-frontend
sonar.projectName=ORCA Frontend
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.*,**/coverage/**
sonar.tests=src
sonar.test.inclusions=**/*.test.jsx,**/*.test.js
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: entry points and pure-presentational/vendor-driven files
# that carry no branching logic to unit-test (still analysed for security/quality).
#   main.jsx            - React entry point (ReactDOM.render bootstrap)
#   **/*.css            - stylesheets
#   AnnotationCanvas.jsx - Konva.js canvas drawing (FR-09); validated via E2E
sonar.coverage.exclusions=**/main.jsx,**/*.css,**/components/AnnotationCanvas.jsx
