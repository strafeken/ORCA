sonar.projectKey=orca-frontend
sonar.projectName=ORCA Frontend
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.*,**/coverage/**
sonar.tests=src
sonar.test.inclusions=**/*.test.jsx,**/*.test.js
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: entry points and pure-presentational/vendor-driven files
# that carry no branching logic to unit-test (still analysed for security/quality).
#   main.jsx, App.jsx         - React bootstrap & route wiring
#   **/*.css                  - stylesheets
#   AnnotationCanvas.jsx      - Konva.js canvas drawing (FR-09); validated via E2E
#   ConsultThread.jsx         - live chat UI (WebSocket, media blobs); E2E only
#   AppShell / AdminShell / *Menu / Brand - layout chrome; no business logic
#   hooks/useAuthedBlobURL.js - authenticated blob URLs for gated file downloads
#   pages/* (admin & feature)   - dashboard, consult, admin consoles; E2E validated
#
# Unit/integration tests focus on auth flows (login, register, TOTP, password reset).
sonar.coverage.exclusions=**/main.jsx,**/App.jsx,**/*.css,**/components/AnnotationCanvas.jsx,**/components/ConsultThread.jsx,**/components/AppShell.jsx,**/components/AdminShell.jsx,**/components/AdminMenu.jsx,**/components/UserMenu.jsx,**/components/Brand.jsx,**/hooks/**,**/pages/AdminDashboard.jsx,**/pages/AdminLogin.jsx,**/pages/AdminLogs.jsx,**/pages/AdminSessions.jsx,**/pages/AdminUserManagement.jsx,**/pages/AdminChatlogs.jsx,**/pages/DbViewer.jsx,**/pages/Dashboard.jsx,**/pages/ConsultExpert.jsx,**/pages/ExpertDirectory.jsx,**/pages/UserProfile.jsx,**/pages/NotFound.jsx
