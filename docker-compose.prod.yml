services:
  nginx:
    image: nginx:1.30.2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m


  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m


  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      # Persist uploaded files and voice messages across container rebuilds.
      # The image creates /app/uploads owned by appuser, so a fresh named
      # volume inherits that ownership and stays writable (see backend/Dockerfile).
      - backend_uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G


  db:
    image: mysql:8.4.9
    env_file:
      - .env
    command: --innodb-buffer-pool-size=2G --innodb-log-buffer-size=64M
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G


  loki:
    image: grafana/loki:3.7.2
    user: "10001:10001"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m


  alloy:
    image: grafana/alloy:v1.17.0
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m


  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      - sonardb
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G


  sonardb:
    image: postgres:15-alpine
    container_name: sonardb
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: sonar
    volumes:
      - sonardb_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m


volumes:
  mysql_data:
  backend_uploads:
  loki_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonardb_data:
