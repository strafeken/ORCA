services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

  db:
    image: mysql:8.4
    env_file:
      - .env
    command: --innodb-buffer-pool-size=128M --innodb-log-buffer-size=16M
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  mysql_data: